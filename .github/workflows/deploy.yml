name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Replace __VERSION__ with commit SHA (cache bust)
        run: |
          VERSION="${GITHUB_SHA::7}"
          echo "Stamping assets with VERSION=$VERSION"
          grep -rl '__VERSION__' --include='*.html' . | xargs -r sed -i "s/__VERSION__/$VERSION/g"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
